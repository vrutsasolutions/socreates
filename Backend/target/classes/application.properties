# ─────────────────────────────────────────
# IdeaSpark Backend - application.properties
# ─────────────────────────────────────────

# Server
server.port=8081

# ── Supabase PostgreSQL ──────────────────
# Credentials come from environment variables so no secrets are committed to git.
# Set DB_PASSWORD (and optionally DB_URL / DB_USERNAME) in your shell or IDE run config.
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres.vadtiyxkwzoeruhhmwiu}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ──────────────────────────────────
# Must be at least 32 characters. Override with the JWT_SECRET env var in production.
jwt.secret=${JWT_SECRET:ideaspark_super_secret_key_2025_must_be_long}
jwt.expiration=86400000

# ── CORS ─────────────────────────────────
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ── File Upload ───────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Logging ───────────────────────────────
logging.level.com.ideaspark=DEBUG
logging.level.org.springframework.security=INFO
