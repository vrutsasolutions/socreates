# ─────────────────────────────────────────
# IdeaSpark Backend - application.properties
# ─────────────────────────────────────────

# Server
server.port=8080

# ── Supabase PostgreSQL ──────────────────
# Replace YOUR_PROJECT_REF and YOUR_PASSWORD
spring.datasource.url=jdbc:postgresql://db.YOUR_PROJECT_REF.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=YOUR_SUPABASE_DB_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ──────────────────────────────────
# Must be at least 32 characters
jwt.secret=ideaspark_super_secret_key_2025_must_be_long
jwt.expiration=86400000

# ── CORS ─────────────────────────────────
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ── File Upload ───────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Logging ───────────────────────────────
logging.level.com.ideaspark=DEBUG
logging.level.org.springframework.security=INFO
