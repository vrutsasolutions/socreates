# ─────────────────────────────────────────
# IdeaSpark Backend - application.properties
# ─────────────────────────────────────────

app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}

# Server
server.port=8081

# ── Supabase PostgreSQL ──────────────────
# Credentials come from environment variables so no secrets are committed to git.
# Set DB_PASSWORD (and optionally DB_URL / DB_USERNAME) in your shell or IDE run config.
#
# Uses Supabase's TRANSACTION-mode pooler (port 6543), which multiplexes
# connections and supports many more clients than session mode (port 5432,
# capped at 15). Transaction mode does NOT support server-side prepared
# statements, so they are disabled below (prepareThreshold=0 + Hikari cache off).
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?prepareThreshold=0}
spring.datasource.username=${DB_USERNAME:postgres.vadtiyxkwzoeruhhmwiu}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool — keep small; transaction pooler handles concurrency server-side.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=120000
# Disable client-side prepared-statement caching (incompatible with transaction pooler).
spring.datasource.hikari.data-source-properties.cachePrepStmts=false
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=0
spring.datasource.hikari.data-source-properties.useServerPrepStmts=false

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ──────────────────────────────────
# Must be at least 32 characters. Override with the JWT_SECRET env var in production.
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ── Admin ──────────────────────────────────
# The single account allowed to trigger revenue-pool distribution
# (/api/admin/pools/{month}/distribute). Granted ROLE_ADMIN in
# UserDetailsServiceImpl; enforced via hasRole("ADMIN") in SecurityConfig.
# Override with the ADMIN_EMAIL env var in production.
app.admin.email=${ADMIN_EMAIL:vrutsasolutions@gmail.com}

# ── CORS ─────────────────────────────────
cors.allowed-origins=https://socreate.in,https://www.socreate.in,http://localhost:5173,http://localhost:3000

# ── File Upload ───────────────────────────
app.upload.dir=${APP_UPLOAD_DIR:uploads}
app.base-url=${APP_BASE_URL:http://localhost:8081,dqgzhxjzmwjv3.cloudfront.net}
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ── Logging ───────────────────────────────
logging.level.com.ideaspark=INFO
logging.level.org.springframework.security=INFO

# ── Cloudflare ────────────────────────────
cloudflare.r2.account-id=${CLOUDFLARE_ACCOUNT_ID}
cloudflare.r2.access-key=${CLOUDFLARE_ACCESS_KEY}
cloudflare.r2.secret-key=${CLOUDFLARE_SECRET_KEY}
cloudflare.r2.bucket-name=project-images
cloudflare.r2.public-url=https://pub-66365150784f44279e76bad393ffaa88.r2.dev

# ── Razorpay (memberships — UNCHANGED) ────
# Payments stays on Razorpay per HR decision. Only creator payouts move to Cashfree.
razorpay.key-id=${RAZORPAY_KEY_ID:}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:}

# Used by RazorpayWebhookService to verify X-Razorpay-Signature via HMAC-SHA256.
# Set this yourself in the Razorpay dashboard (Settings -> Webhooks) — it is
# NOT issued automatically and can be generated/tested locally before you
# have real API keys.
razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:}

# ── RazorpayX (DEPRECATED — superseded by Cashfree Payouts below) ─────
# Retained (commented) for rollback only. Delete these two lines and their
# Elastic Beanstalk env vars after 30 days of stable Cashfree operation.
# razorpayx.account-number=${RAZORPAYX_ACCOUNT_NUMBER:}
# razorpayx.webhook-secret=${RAZORPAYX_WEBHOOK_SECRET:}

# ── Cashfree Payouts (creator payouts) ────────────────────────
# Uses Cashfree Payouts v2 API. Credentials come from the Cashfree Merchant
# Dashboard → Payouts → Developers → API Keys. Sandbox and Production have
# SEPARATE credentials — never mix them.
#
# cashfree.payout.env selects the base URL used by CashfreePayoutService:
#   "sandbox"    → https://sandbox.cashfree.com/payout   (default)
#   "production" → https://api.cashfree.com/payout
# Flip via the CASHFREE_PAYOUT_ENV env var — do NOT hard-code "production"
# in this file, so local runs can't accidentally hit live.
cashfree.payout.env=${CASHFREE_PAYOUT_ENV:sandbox}
cashfree.payout.client-id=${CASHFREE_PAYOUT_CLIENT_ID:}
cashfree.payout.client-secret=${CASHFREE_PAYOUT_CLIENT_SECRET:}

# HMAC-SHA256 secret used by CashfreeWebhookService to verify
# x-webhook-signature. Generated in the Cashfree Dashboard → Payouts →
# Developers → Webhooks. IMPORTANT: Cashfree signs (x-webhook-timestamp +
# rawBody) and returns the signature BASE64-encoded — different from
# RazorpayX which signs rawBody only and returns HEX. The webhook service
# handles this correctly; don't try to reuse the RazorpayX verification code.
cashfree.payout.webhook-secret=${CASHFREE_PAYOUT_WEBHOOK_SECRET:}

# Cashfree API version pin. Sent as x-api-version header on every request.
# Do NOT leave blank — an unversioned request silently follows Cashfree's
# latest breaking changes. Bump this only when you've reviewed the
# Cashfree changelog and re-run the sandbox test suite.
cashfree.payout.api-version=${CASHFREE_PAYOUT_API_VERSION:2024-01-01}

# ── Groq AI ───────────────────────────────
groq.api.key=${GROQ_API_KEY:}

# ── Gmail SMTP ────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Google OAuth ──────────────────────────
google.client.id=${GOOGLE_CLIENT_ID:}
